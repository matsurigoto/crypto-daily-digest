<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Crypto Daily Digest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #58a6ff;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    /* Date navigation */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .date-nav button {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s;
    }

    .date-nav button:hover { background: #30363d; }

    .date-nav input[type="date"] {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.45rem 0.75rem;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .date-nav input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    .date-label {
      font-size: 1rem;
      color: #8b949e;
    }

    /* Cards */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #58a6ff;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #30363d;
    }

    .market-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .coin-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem;
    }

    .coin-symbol {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 0.35rem;
    }

    .coin-price {
      font-size: 1rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 0.25rem;
    }

    .coin-change {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .positive { color: #3fb950; }
    .negative { color: #f85149; }
    .neutral  { color: #8b949e; }

    .coin-meta {
      font-size: 0.78rem;
      color: #8b949e;
      line-height: 1.6;
    }

    .coin-signal {
      display: inline-block;
      margin-top: 0.4rem;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      background: #21262d;
      color: #58a6ff;
    }

    /* Summary */
    .summary-block {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      line-height: 1.8;
      white-space: pre-wrap;
      font-size: 0.93rem;
    }

    /* News */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .news-item {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .news-source-tag {
      background: #21262d;
      color: #58a6ff;
      font-size: 0.72rem;
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      white-space: nowrap;
      margin-top: 0.1rem;
    }

    .news-content { flex: 1; }

    .news-title a {
      color: #e6edf3;
      text-decoration: none;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .news-title a:hover { color: #58a6ff; text-decoration: underline; }

    .news-summary-zh {
      font-size: 0.82rem;
      color: #8b949e;
      margin-top: 0.25rem;
      line-height: 1.5;
    }

    .news-time {
      font-size: 0.76rem;
      color: #8b949e;
      margin-top: 0.2rem;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #8b949e;
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.95rem; }

    .section { margin-bottom: 2rem; }

    /* Signals section */
    .signals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .signal-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }

    .signal-card-title {
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .fg-value {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .fg-label {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .fg-bar {
      height: 8px;
      border-radius: 4px;
      background: #21262d;
      margin-bottom: 0.5rem;
      overflow: hidden;
    }

    .fg-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .fg-history {
      display: flex;
      gap: 4px;
      margin-top: 0.5rem;
    }

    .fg-dot {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: #fff;
      font-weight: 700;
    }

    .sentiment-bar-wrap {
      position: relative;
      height: 8px;
      border-radius: 4px;
      background: #21262d;
      margin: 0.5rem 0;
      overflow: hidden;
    }

    .sentiment-bar-neg { position: absolute; left: 0; top: 0; height: 100%; background: #f85149; border-radius: 4px 0 0 4px; }
    .sentiment-bar-pos { position: absolute; right: 0; top: 0; height: 100%; background: #3fb950; border-radius: 0 4px 4px 0; }
    .sentiment-center-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #30363d; }

    .sentiment-counts {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: #8b949e;
      margin-top: 0.5rem;
    }

    .onchain-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.85rem;
    }

    .onchain-row:last-child { border-bottom: none; }
    .onchain-key { color: #8b949e; }
    .onchain-val { color: #e6edf3; font-weight: 600; }

    .reddit-post {
      font-size: 0.78rem;
      color: #8b949e;
      padding: 0.25rem 0;
      border-bottom: 1px solid #21262d;
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .reddit-post:last-child { border-bottom: none; }
    .reddit-post-title { flex: 1; line-height: 1.4; }
    .reddit-post-score { color: #3fb950; white-space: nowrap; }

  </style>
  <script src="ads-config.js"></script>
</head>
<body>
  <header>
    <span>📊</span>
    <h1>Crypto Daily Digest</h1>
  </header>

  <div class="container">
    <div class="date-nav">
      <button id="btn-prev">&#8249; 前一天</button>
      <input type="date" id="date-picker" />
      <button id="btn-next">後一天 &#8250;</button>
      <span class="date-label" id="date-display"></span>
    </div>

    <div id="app-content">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <p>載入中...</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
